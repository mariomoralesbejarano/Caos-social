name: Build Android APK (Caos Social)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/caos-social/android/**/*.gradle*', 'artifacts/caos-social/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Build only Caos Social (skip Vite mockup-sandbox & demos that fail in CI).
      # PORT=3000 prevents Vite-style PORT-required errors that bleed into the workspace context.
      - name: Export Expo web bundle
        env:
          PORT: "3000"
          EXPO_NO_TYPESCRIPT_SETUP: "1"
          CI: "1"
        run: PORT=3000 pnpm --filter "./artifacts/caos-social" run build

      - name: Add Android platform (if missing)
        working-directory: artifacts/caos-social
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Apply custom app icons (square + round)
        working-directory: artifacts/caos-social
        run: |
          if [ ! -d custom-icons/android ]; then
            echo "::warning::custom-icons/android not found, skipping icon injection"
            exit 0
          fi
          # 1) Copy square launchers into the generated Android res/
          cp -rv custom-icons/android/* android/app/src/main/res/

          # 2) Generate round launchers from the same source PNGs
          for d in android/app/src/main/res/mipmap-*; do
            if [ -f "$d/ic_launcher.png" ]; then
              cp -v "$d/ic_launcher.png" "$d/ic_launcher_round.png"
            fi
          done

          # 3) Remove any leftover adaptive-icon XMLs that reference assets
          #    we are not providing, so AAPT2 doesn't fail.
          find android/app/src/main/res/mipmap-anydpi-v26 -type f -name "ic_launcher*.xml" -delete 2>/dev/null || true

          echo "Final mipmap contents:"
          ls -la android/app/src/main/res/mipmap-* || true

      - name: Inject Firebase google-services.json
        working-directory: artifacts/caos-social
        run: |
          if [ ! -f firebase/google-services.json ]; then
            echo "::warning::firebase/google-services.json missing, push notifications disabled"
            exit 0
          fi
          cp -v firebase/google-services.json android/app/google-services.json

          # Aplica el plugin Gradle de Google Services al módulo app (idempotente).
          APP_GRADLE=android/app/build.gradle
          if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            echo "" >> "$APP_GRADLE"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
          fi

          # Añade la dependencia del classpath en el build.gradle raíz.
          ROOT_GRADLE=android/build.gradle
          if ! grep -q "com.google.gms:google-services" "$ROOT_GRADLE"; then
            python3 - <<'PY'
import re, pathlib
p = pathlib.Path("android/build.gradle")
s = p.read_text()
dep = "        classpath 'com.google.gms:google-services:4.4.2'\n"
if "buildscript" in s and "dependencies" in s:
    # Insert inside the first buildscript { ... dependencies { ... } } block.
    s = re.sub(
        r"(buildscript\s*\{[\s\S]*?dependencies\s*\{)",
        r"\1\n" + dep,
        s,
        count=1,
    )
else:
    s = (
        "buildscript {\n  repositories { google(); mavenCentral() }\n"
        "  dependencies {\n" + dep + "  }\n}\n\n" + s
    )
p.write_text(s)
print("[google-services] classpath injected")
PY
          fi

      - name: Capacitor sync
        working-directory: artifacts/caos-social
        run: pnpm exec cap sync android

      - name: Build debug APK
        working-directory: artifacts/caos-social/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caos-social-debug-apk
          path: artifacts/caos-social/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
