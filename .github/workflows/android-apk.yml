name: Build Android APK (Caos Social)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      # Build assets con el parche del PORT para evitar errores de Vite
      - name: Export Expo web bundle
        env:
          PORT: "3000"
          CI: "1"
        run: PORT=3000 pnpm --filter "./artifacts/caos-social" run build

      - name: Add Android platform (if missing)
        working-directory: artifacts/caos-social
        run: |
          if [ ! -d android ]; then
            pnpm exec cap add android
          fi

      - name: Inject Custom Icons
        run: |
          echo "Inyectando iconos desde custom-icons a artifacts..."
          SOURCE_DIR="custom-icons"
          DEST_DIR="artifacts/caos-social/android/app/src/main/res"
          
          if [ -d "$SOURCE_DIR" ]; then
            rm -rf $DEST_DIR/mipmap-*
            cp -rv "$SOURCE_DIR"/mipmap-* $DEST_DIR/
            for dir in $DEST_DIR/mipmap-*; do
              if [ -f "$dir/ic_launcher.png" ]; then
                cp -v "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
              fi
            done
          else
            echo "❌ ERROR: Carpeta $SOURCE_DIR no encontrada"
            exit 1
          fi

      - name: Inject Firebase google-services.json
        run: |
          echo "Configurando Firebase..."
          # Ruta origen (desde la raíz del repo) y destino (dentro de artifacts)
          JSON_SRC="firebase/google-services.json"
          JSON_DEST="artifacts/caos-social/android/app/google-services.json"
          
          if [ -f "$JSON_SRC" ]; then
            cp -v "$JSON_SRC" "$JSON_DEST"
            
            # Modificamos los archivos gradle usando sed (más seguro que Python en YAML)
            APP_GRADLE="artifacts/caos-social/android/app/build.gradle"
            ROOT_GRADLE="artifacts/caos-social/android/build.gradle"
            
            # Aplicar plugin en app/build.gradle
            if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
              echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
            fi
            
            # Añadir classpath en build.gradle raíz
            if ! grep -q "com.google.gms:google-services" "$ROOT_GRADLE"; then
              sed -i "/dependencies {/a \        classpath 'com.google.gms:google-services:4.4.2'" "$ROOT_GRADLE"
            fi
            echo "✅ Firebase configurado correctamente."
          else
            echo "⚠️ ADVERTENCIA: No se encontró google-services.json. Notificaciones desactivadas."
          fi

      - name: Capacitor sync
        working-directory: artifacts/caos-social
        run: pnpm exec cap sync android

      - name: Build debug APK
        working-directory: artifacts/caos-social/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caos-social-debug-apk
          path: artifacts/caos-social/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          
